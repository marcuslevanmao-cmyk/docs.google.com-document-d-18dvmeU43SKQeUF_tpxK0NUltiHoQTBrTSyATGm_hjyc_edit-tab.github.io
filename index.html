<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Untitled document - Google Docs</title>
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/comments.css">
</head>
<body>

<div class="app-shell" id="app-shell">
  <header class="app-header">
    <div class="header-top">
      <div class="doc-icon" aria-hidden="true">
        <svg width="26" height="34" viewBox="0 0 28 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M17 0H3a2 2 0 0 0-2 2v32a2 2 0 0 0 2 2h22a2 2 0 0 0 2-2V9L17 0z" fill="#4285F4"/>
          <path d="M17 0v7a2 2 0 0 0 2 2h8L17 0z" fill="#A0C3FF"/>
          <rect x="6" y="16" width="14" height="1.6" fill="#fff"/>
          <rect x="6" y="20" width="14" height="1.6" fill="#fff"/>
          <rect x="6" y="24" width="8" height="1.6" fill="#fff"/>
        </svg>
      </div>
      <div class="title-block">
        <div class="title-row">
          <input type="text" class="doc-title" value="Untitled document" placeholder="Untitled document">
          <button class="star-btn" title="Star Document">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          </button>
        </div>
        <div class="menubar">
          <span>File</span><span>Edit</span><span>View</span><span>Insert</span><span>Format</span><span>Tools</span><span>Extensions</span><span>Help</span>
        </div>
      </div>
      
      <div class="header-actions">
        <button class="icon-btn" id="history-btn" title="Open version history">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12h-2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8c2.05 0 3.93.78 5.35 2.05L14 9h7V2l-2.67 2.67C16.65 3.02 14.46 2 11.99 2zm.01 5v5l4.28 2.54.72-1.21-3.5-2.08V7h-1.5z"/>
          </svg>
        </button>
        
        <button class="icon-btn" id="toolbar-comment-btn" data-action="comment" title="Add comment (Ctrl+Alt+M)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M21 4H3c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h2v4l4-4h12c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 12H7.2l-2.2 2.2V16H3V6h18v10zm-14-3h12v-2H7v2zm0-3h12V8H7v2z"/>
          </svg>
        </button>
        
        <button class="share-btn" title="Share Document">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:6px;"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          Share
        </button>
        <div class="avatar-circle">U</div>
      </div>
    </div>

    <div class="toolbar">
      <button class="toolbar-btn" data-action="undo" title="Undo (Ctrl+Z)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v6h6M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
      </button>
      <button class="toolbar-btn" data-action="redo" title="Redo (Ctrl+Y)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 7v6h-6M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"/></svg>
      </button>
      <div class="toolbar-sep"></div>
      <button class="toolbar-btn" data-action="bold" title="Bold (Ctrl+B)"><b>B</b></button>
      <button class="toolbar-btn" data-action="italic" title="Italic (Ctrl+I)"><i>I</i></button>
      <button class="toolbar-btn" data-action="underline" title="Underline (Ctrl+U)"><u>U</u></button>
    </div>
  </header>

  <div class="workspace-wrapper">
    <main class="doc-canvas" id="doc-canvas">
      </main>

    <aside class="side-panel" id="comments-sidebar">
      <div class="comments-panel">
        <div class="comments-panel-header">
          <h2>Comments</h2>
        </div>
        <div id="comments-container"></div>
      </div>
    </aside>
  </div>
</div>

<script src="js/editor.js"></script>
<script src="js/comments.js"></script>
<script src="js/history.js"></script>
<script src="js/app.js"></script>
<script>
  // Wires inline operations immediately upon canvas construction
  document.addEventListener("DOMContentLoaded", () => {
    EditorEngine.initFirstPage();
    CommentsEngine.bindSelectionListener();
    
    const cBtn = document.getElementById('toolbar-comment-btn');
    if(cBtn) cBtn.addEventListener('click', () => CommentsEngine.promptForCommentOnSelection());
  });
</script>
</body>
</html>
