<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untitled document</title>
<link rel="stylesheet" href="styles/layout.css">
<link rel="stylesheet" href="styles/components.css">
<link rel="stylesheet" href="styles/comments.css">
</head>
<body>

<!-- ============ APPLICATION HEADER ============ -->
<header class="app-header">
  <div class="header-top">
    <div class="doc-icon" aria-hidden="true">
      <svg width="28" height="36" viewBox="0 0 28 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M17 0H3a2 2 0 0 0-2 2v32a2 2 0 0 0 2 2h22a2 2 0 0 0 2-2V9L17 0z" fill="#4285F4"/>
        <path d="M17 0v7a2 2 0 0 0 2 2h8L17 0z" fill="#A0C3FF"/>
        <rect x="6" y="16" width="14" height="1.6" fill="#fff"/>
        <rect x="6" y="20" width="14" height="1.6" fill="#fff"/>
        <rect x="6" y="24" width="9" height="1.6" fill="#fff"/>
      </svg>
    </div>
    <div class="title-block">
      <input class="doc-title" type="text" value="Untitled document" aria-label="Document title">
      <nav class="menu-bar" aria-label="Menu">
        <button class="menu-item">File</button>
        <button class="menu-item">Edit</button>
        <button class="menu-item">View</button>
        <button class="menu-item">Insert</button>
        <button class="menu-item">Format</button>
        <button class="menu-item">Tools</button>
        <button class="menu-item">Extensions</button>
        <button class="menu-item">Help</button>
      </nav>
    </div>
    <div class="header-actions">
      <button id="history-toggle-btn" class="icon-btn" title="Version history" aria-label="Version history">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M13 3a9 9 0 1 0 9 9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M13 3v6h6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 8v5l3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="comments-toggle-btn" class="icon-btn" title="Show comments" aria-label="Show comments">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="avatar" title="You">U</div>
    </div>
  </div>

  <!-- ============ HOVER TOOLBAR ============ -->
  <div class="hover-toolbar" role="toolbar" aria-label="Formatting toolbar">
    <button class="toolbar-btn" title="Undo" data-action="undo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 14 4 9l5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 9h10.5A5.5 5.5 0 0 1 20 14.5v0A5.5 5.5 0 0 1 14.5 20H11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="toolbar-btn" title="Redo" data-action="redo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 14l5-5-5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M20 9H9.5A5.5 5.5 0 0 0 4 14.5v0A5.5 5.5 0 0 0 9.5 20H13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <span class="toolbar-divider"></span>
    <select class="toolbar-select" title="Zoom" aria-label="Zoom level">
      <option>75%</option><option selected>100%</option><option>125%</option><option>150%</option>
    </select>
    <span class="toolbar-divider"></span>
    <select class="toolbar-select" title="Style" aria-label="Paragraph style">
      <option>Normal text</option><option>Title</option><option>Heading 1</option><option>Heading 2</option><option>Heading 3</option>
    </select>
    <span class="toolbar-divider"></span>
    <select class="toolbar-select font-select" title="Font" aria-label="Font family">
      <option>Arial</option><option>Georgia</option><option>Times New Roman</option><option>Courier New</option>
    </select>
    <span class="toolbar-divider"></span>
    <button class="toolbar-btn" title="Bold" data-action="bold"><b>B</b></button>
    <button class="toolbar-btn" title="Italic" data-action="italic"><i>I</i></button>
    <button class="toolbar-btn" title="Underline" data-action="underline"><u>U</u></button>
    <span class="toolbar-divider"></span>
    <button class="toolbar-btn" title="Text color" data-action="forecolor">A<span class="color-swatch" style="background:#d93025"></span></button>
    <button class="toolbar-btn" title="Highlight color" data-action="hilitecolor">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 11l3-3 6 6-3 3-6-6z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M3 21l4-1 8-8-3-3-8 8-1 4z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
    </button>
    <span class="toolbar-divider"></span>
    <button class="toolbar-btn" title="Insert link" data-action="link">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 15l6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M10 6.5l1-1a3.5 3.5 0 0 1 5 5l-1 1M14 17.5l-1 1a3.5 3.5 0 0 1-5-5l1-1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <button class="toolbar-btn" title="Add comment" data-action="comment">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M20 2H4a2 2 0 0 0-2 2v13l4-3h14a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M17 8h1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <span class="toolbar-divider"></span>
    <button class="toolbar-btn" title="Align left" data-action="justifyleft">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 6h16M4 12h10M4 18h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <button class="toolbar-btn" title="Bulleted list" data-action="insertunorderedlist">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="5" cy="6" r="1.4" fill="currentColor"/><circle cx="5" cy="12" r="1.4" fill="currentColor"/><circle cx="5" cy="18" r="1.4" fill="currentColor"/><path d="M10 6h10M10 12h10M10 18h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
  </div>
</header>

<!-- ============ MAIN WORKSPACE WRAPPER ============ -->
<div class="workspace-wrapper">

  <!-- Left Column: workspace gutter -->
  <div class="workspace-gutter" aria-hidden="true"></div>

  <!-- Center Column: scrollable document canvas -->
  <main class="doc-canvas" id="doc-canvas">
    <!-- .doc-page elements are injected here by editor.js -->
  </main>

  <!-- Right Column: comments + version panel -->
  <aside class="side-panel" id="side-panel">
    <div class="side-panel-section" id="comments-panel">
      <h2 class="side-panel-heading">Comments</h2>
      <div class="comment-list" id="comment-list">
        <p class="side-panel-empty">Select text and click the comment icon to start a discussion.</p>
      </div>
    </div>
    <div class="side-panel-section" id="history-panel" hidden>
      <h2 class="side-panel-heading">Version history</h2>
      <div class="version-list" id="version-list"></div>
    </div>
  </aside>

</div>

<script src="js/history.js"></script>
<script src="js/comments.js"></script>
<script src="js/editor.js"></script>
<script src="js/app.js"></script>
</body>
</html>
